<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tennis Blog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GR1HJ525RY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GR1HJ525RY');
</script>

<body>
    <header class="site-header">
        <div class="site-header__bar">
            <a class="site-header__brand site-header__brand-link" href="{{ url_for('index') }}" aria-label="Match Point Media (Home)">
                <img src="{{ url_for('static', filename='Website_logo.png') }}" alt="Match Point Media" class="site-header__logo" width="180" height="32">
            </a>
            <nav class="site-header__nav" aria-label="Main navigation">
                <a class="site-header__link {% if request.endpoint == 'index' %}is-active{% endif %}" href="{{ url_for('index') }}">Home</a>
                <div class="site-header__dropdown">
                    <a class="site-header__link {% if request.endpoint == 'articles' %}is-active{% endif %}" href="{{ url_for('articles') }}">News</a>
                    <ul class="site-header__dropdown-menu" aria-label="News categories">
                        <li><a href="{{ url_for('articles') }}">Baseline Brief</a></li>
                        <li><a href="{{ url_for('articles') }}">Court Culture</a></li>
                        <li><a href="{{ url_for('articles') }}">The Tennis Lab</a></li>
                    </ul>
                </div>
                <a class="site-header__link {% if request.endpoint == 'rankings' %}is-active{% endif %}" href="{{ url_for('rankings') }}">Rankings</a>
                <a class="site-header__link {% if request.endpoint == 'abouttheauthor' %}is-active{% endif %}" href="{{ url_for('abouttheauthor') }}">About the author</a>
                <a class="site-header__link {% if request.endpoint == 'questionspage' %}is-active{% endif %}" href="{{ url_for('questionspage') }}">Questions</a>
            </nav>
        </div>
    </header>

    <main class="main-content {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2024 Tennis Blog</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tennis Blog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GR1HJ525RY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GR1HJ525RY');
</script>

<body>
    <header class="site-header">
        <a class="site-header__brand site-header__brand-link" href="{{ url_for('index') }}" aria-label="Match Point Media (Home)">
            <img src="{{ url_for('static', filename='tennisballimage.png') }}" alt="" class="site-header__logo" width="32" height="32">
            <h1 class="site-header__title">Match Point Media</h1>
        </a>
        <nav class="site-header__nav">
            <select id="pageDropdown" class="site-header__select pagenavdropdown" onchange="navigateToPage()" aria-label="Navigate to page">
                <option value="#">Select Page</option>
                <option value="{{ url_for('index') }}">Home</option>
                <option value="{{ url_for('rankings') }}">Rankings</option>
                <option value="{{ url_for('abouttheauthor') }}">About the author</option>
                <option value="{{ url_for('questionspage') }}">Questions</option>
            </select>
        </nav>
    </header>

    <main class="main-content {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2024 Tennis Blog</p>
    </footer>

    <script>
        function navigateToPage() {
            var dropdown = document.getElementById("pageDropdown");
            var selectedPage = dropdown.value;
            if (selectedPage !== "#") {
                window.location.href = selectedPage;
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

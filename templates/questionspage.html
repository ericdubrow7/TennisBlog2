{% extends 'base.html' %}

{% block title %}Ask a question — Tennis Blog{% endblock %}

{% block main_class %}question-page main-content--narrow{% endblock %}

{% block content %}
<h2 class="page-title">Ask me anything</h2>
<div class="question-form">
    <form id="questionForm">
        <div class="form-group">
            <label for="userQuestion" class="form-label">Your question</label>
            <textarea class="textarea question-box" id="userQuestion" name="question" placeholder="Type your question here..." rows="5"></textarea>
        </div>
        <button type="submit" class="btn">Submit</button>
    </form>
    <div class="response-box" id="response" aria-live="polite">
        <p>Response will be displayed here...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('questionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var userQuestion = document.getElementById('userQuestion').value;
    var responseEl = document.getElementById('response');

    try {
        var res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: userQuestion })
        });
        var data = await res.json();
        responseEl.innerHTML = '<p>Response: ' + data.response + '</p>';
        responseEl.classList.add('is-visible');
    } catch (err) {
        responseEl.innerHTML = '<p>Sorry, something went wrong. Please try again.</p>';
        responseEl.classList.add('is-visible');
    }
});
</script>
{% endblock %}
